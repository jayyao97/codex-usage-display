<svg xmlns="http://www.w3.org/2000/svg" width="480" height="480" viewBox="0 0 480 480">
  <rect width="480" height="480" fill="#000"/>

  <g font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-variant-numeric="tabular-nums">
    <text x="16" y="31" fill="#dce3e7" font-size="18" font-weight="400" letter-spacing=".2">07/18 14:32</text>
    <g transform="translate(386 14)" fill="none" stroke="#08c9f4" stroke-width="2.5"
       stroke-linecap="round" stroke-linejoin="round">
      <path d="M7 0v18l7-6-10-8 10 8-7 6"/>
    </g>
    <text x="411" y="31" fill="#aeb8bd" font-size="13" font-weight="400">LINKED</text>

    <!-- 270° gauge track. r=143, circumference≈898.50, visible arc≈673.87. -->
    <circle cx="240" cy="207" r="143" fill="none" stroke="#24282b" stroke-width="18"
      stroke-linecap="round" stroke-dasharray="673.87 224.63"
      transform="rotate(135 240 207)"/>

    <!-- Remaining quota: 68% of the 270° track = 458.23px = 183.6°. -->
    <circle cx="240" cy="207" r="143" fill="none" stroke="#08c9f4" stroke-width="18"
      stroke-linecap="round" stroke-dasharray="458.23 440.27"
      transform="rotate(135 240 207)"/>

    <text x="240" y="142" fill="#08c9f4" font-size="18" font-weight="400" text-anchor="middle" letter-spacing=".5">7 DAY LEFT</text>
    <text x="240" y="247" fill="#fff" font-size="100" font-weight="500" text-anchor="middle">68<tspan font-size="46" font-weight="400">%</tspan></text>
    <text x="240" y="345" fill="#08c9f4" font-size="13" font-weight="400" text-anchor="middle">QUOTA RESET 2d 8h</text>

    <!-- One segment per reset credit. Amber is used only when the nearest expiry is within 48 hours. -->
    <text x="166" y="369" fill="#7c878c" font-size="11" font-weight="400">RESET</text>
    <g stroke-width="6" stroke-linecap="round">
      <path d="M215 365h20" stroke="#08c9f4"/>
      <path d="M245 365h20" stroke="#08c9f4"/>
      <path d="M275 365h20" stroke="#08c9f4"/>
    </g>

    <rect x="15" y="384" width="450" height="80" rx="10" fill="#020506" stroke="#08c9f4" stroke-width="1.5"/>
    <path d="M128 397v54M244 397v54M342 397v54" stroke="#303538" stroke-width="1"/>

    <text x="30" y="407" fill="#08c9f4" font-size="12" font-weight="400">TODAY</text>
    <text x="30" y="445" fill="#fff" font-size="26" font-weight="500">1.25M</text>

    <text x="145" y="407" fill="#08c9f4" font-size="12" font-weight="400">LAST 7D</text>
    <text x="145" y="445" fill="#fff" font-size="26" font-weight="500">6.84M</text>

    <text x="263" y="407" fill="#08c9f4" font-size="12" font-weight="400">RUN</text>
    <text x="263" y="445" fill="#fff" font-size="26" font-weight="500">3</text>

    <text x="358" y="407" fill="#08c9f4" font-size="12" font-weight="400">NEXT EXP</text>
    <text x="358" y="445" fill="#fff" font-size="24" font-weight="500">3d 4h</text>
  </g>
</svg>
